[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/sync-openfootball"
  to = "/.netlify/functions/sync-openfootball"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200